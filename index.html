<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fábula Ultima — Livro de Classes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-header" onclick="showHome()" style="cursor:pointer">
      <div class="logo-mark">⚔</div>
      <h1 class="site-title">Fábula Ultima</h1>
      <p class="site-subtitle">Livro de Classes</p>
    </div>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Buscar classe, poder, feitiço..." autocomplete="off">
      <span class="search-icon">🔍</span>
    </div>

    <!-- FILTER PILLS -->
    <div class="filter-bar">
      <button class="filter-pill active" data-filter="all">Todas</button>
      <button class="filter-pill" data-filter="combate">Combate</button>
      <button class="filter-pill" data-filter="magia">Magia</button>
      <button class="filter-pill" data-filter="suporte">Suporte</button>
      <button class="filter-pill" data-filter="utilidade">Utilidade</button>
    </div>

    <nav id="classNav"></nav>

    <!-- EXTRA SECTIONS NAV -->
    <div class="nav-section-header">Referências</div>
    <div class="extra-nav">
      <div class="nav-item" onclick="showSection('dancas')"><span class="nav-emoji">💃</span><span class="nav-label">Danças</span></div>
      <div class="nav-item" onclick="showSection('feiticos')"><span class="nav-emoji">✨</span><span class="nav-label">Feitiços</span></div>
      <div class="nav-item" onclick="showSection('magissementes')"><span class="nav-emoji">🌸</span><span class="nav-label">Magissementes</span></div>
      <div class="nav-item" onclick="showSection('terioformas')"><span class="nav-emoji">🧬</span><span class="nav-label">Terioformas</span></div>
      <div class="nav-item" onclick="showSection('simbolos')"><span class="nav-emoji">🎨</span><span class="nav-label">Símbolos</span></div>
      <div class="nav-item" onclick="showSection('versos')"><span class="nav-emoji">🎵</span><span class="nav-label">Versos</span></div>
      <div class="nav-item" onclick="showSection('invocacoes')"><span class="nav-emoji">🌊</span><span class="nav-label">Invocações</span></div>
      <div class="nav-item" onclick="showSection('infusoes')"><span class="nav-emoji">⚒️</span><span class="nav-label">Infusões</span></div>
    </div>

    <div class="sidebar-footer">Fábula Ultima RPG</div>
  </aside>

  <button id="sidebarToggle" aria-label="Abrir menu">
    <span></span><span></span><span></span>
  </button>

  <main id="main">
    <section id="home" class="page active"></section>
    <section id="classDetail" class="page"></section>
    <section id="sectionDetail" class="page"></section>
  </main>

  <div id="overlay"></div>

  <script src="classes.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
